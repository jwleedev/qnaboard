<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A 게시판</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="board-container">
    <!-- Top Navigation Area -->
    <div class="d-flex justify-content-end mb-4 align-items-center">
        <a th:if="${member == null}" href="/login" class="text-dark fw-bold text-decoration-none">로그인</a>

        <div th:if="${member != null}" class="d-flex align-items-center gap-3">
            <div>
                <span class="text-dark fw-bold">사용자 </span>
                <span th:text="${member.name}">이름</span>
            </div>

            <form action="/logout" method="post" class="m-0 p-0">
                <button type="submit" class="btn btn-link text-dark fw-bold text-decoration-none p-0 border-0">로그아웃</button>
            </form>
        </div>
    </div>

    <div class="board-header flex-column flex-md-row align-items-start align-items-md-end">
        <h2 class="board-title mb-3 mb-md-0">Q&A</h2>

        <div class="d-flex align-items-center w-100 justify-content-md-end">
            <span class="text-muted me-auto me-md-4" style="font-size: 0.95rem;">총
                <strong class="text-dark" th:text="${pagination.totalPostCount}"></strong>건
            </span>

            <form action="/posts" method="get" class="search-area d-flex">

                <select name="type" class="form-select me-1" style="width: 100px;">
                    <option value="all" th:selected="${cond.type == null or cond.type == 'all'}">전체</option>
                    <option value="title" th:selected="${cond.type == 'title'}">제목</option>
                    <option value="name" th:selected="${cond.type == 'name'}">작성자</option>
                </select>

                <div class="input-group" style="width: 250px;">
                    <input type="text" name="keyword" class="form-control"
                           placeholder="검색어를 입력해 주세요"
                           th:value="${cond.keyword}">
                    <button class="btn btn-custom-unified" type="submit" style="padding: 0.375rem 0.75rem;">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <table class="board-table">
        <thead>
        <tr>
            <th style="width: 10%">No</th>
            <th style="width: 45%">제목</th>
            <th style="width: 15%">작성자</th>
            <th style="width: 15%">조회수</th>
            <th style="width: 15%">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post: ${posts}">
            <td class="text-center" th:text="${post.postId}">글번호</td>
            <td>
                <a th:href="@{|/posts/${post.postId}|}"
                   class="text-decoration-none text-dark"
                   th:text="${post.title}">제목</a>
            </td>
            <td class="text-center" th:text="${post.name}">작성자</td>
            <td class="text-center" th:text="${post.viewCount}">조회수</td>
            <td class="text-center" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}">작성날짜</td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${pagination != null and pagination.totalPageCount > 0}">
        <ul class="pagination justify-content-center mt-4 mb-5">

            <li class="page-item" th:classappend="${!pagination.existPrevPage} ? 'disabled'">
                <a class="page-link border-0 text-dark"
                   th:href="@{/(page=${pagination.startPage - 1})}"
                   tabindex="-1">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item"
                th:each="num : ${#numbers.sequence(pagination.startPage, pagination.endPage)}"
                th:classappend="${pageRequest.page == num} ? 'active'">
                <a class="page-link border-0"
                   th:classappend="${pageRequest.page == num} ? 'bg-dark border-dark text-white' : 'text-dark'"
                   th:href="@{/posts(page=${num})}"
                   th:text="${num}">
                </a>
            </li>

            <li class="page-item" th:classappend="${!pagination.existNextPage} ? 'disabled'">
                <a class="page-link border-0 text-dark"
                   th:href="@{/posts(page=${pagination.endPage + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

    <div class="d-flex justify-content-end" th:if="${member != null}">
        <a href="/posts/add" class="btn btn-custom-unified">글쓰기</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
