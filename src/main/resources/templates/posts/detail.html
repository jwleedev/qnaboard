<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A 게시글 상세 - Q&A 게시판</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
<div class="board-container">
    <div class="detail-header">
        <h2 class="detail-title mb-3" th:text="${post.title}">제목</h2>

        <div class="d-flex justify-content-end detail-info align-items-center">
            <span>작성자      <span th:text="${post.name}">작성자</span></span>
            <span class="mx-2 text-muted">|</span>

            <span>조회수      <span th:text="${post.viewCount}">조회수</span></span>
            <span class="mx-2 text-muted">|</span>

            <span>등록일      <span th:text="${#temporals.format(post.createdAt, 'yyyy. MM. dd HH:mm')}">등록일</span></span>
        </div>
    </div>

    <!-- Content -->
    <div class="detail-content" th:text="${post.content}" style="white-space: pre-wrap;">
    </div>

    <!-- Comments Section -->
    <div class="comment-section">
        <!-- Write Comment -->
        <div class="comment-write-box">
            <div class="comment-meta"></div>

            <div th:if="${session.loginMember != null}">
                <form th:action="@{/comments/add}" method="post" class="d-flex align-items-stretch">
                    <input type="hidden" name="postId" th:value="${post.postId}">

                    <!-- 타임리프: 로그인한 사용자 이름 바인딩 -->
                    <div class="me-3 fw-bold d-flex align-items-center justify-content-center"
                         th:text="${session.loginMember.name}" style="width: 100px;">작성자
                    </div>

                    <textarea name="content" class="form-control me-3" rows="3" placeholder="댓글을 입력해주세요."
                              style="resize: none;"></textarea>

                    <button type="submit" class="btn btn-custom-unified"
                            style="width: 100px; font-weight: 500; padding: 0;">등록
                    </button>
                </form>
            </div>

            <div th:unless="${session.loginMember != null}" class="txt-center py-3 border">
                <span class="text-muted">댓글을 작성하려면 </span>
                <a th:href="@{/login}" class="text-decoration-none fw-bold text-dark border-bottom border-dark">로그인</a>
                <span class="text-muted">이 필요합니다.</span>
            </div>
        </div>
        <!-- Comment List -->
        <div class="comment-list mt-4">
            <div th:each="comment : ${comments}" class="comment-item">
                <div class="comment-author text-dark" th:text="${comment.name}">작성자</div>
                <div class="comment-text text-dark" th:text="${comment.content}">댓글내용</div>

                <div class="comment-actions">
                    <form th:if="${session.loginMember != null and session.loginMember.memberId == comment.memberId}"
                          th:action="@{/comments/{commentId}/delete(commentId=${comment.commentId}, postId=${post.postId})}"
                          method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger border-0">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Buttons -->
    <div class="d-flex justify-content-end mt-4">
        <th:block th:if="${session.loginMember != null and session.loginMember.memberId == post.memberId}">
            <a th:href="@{|/posts/${post.postId}/edit|}" class="btn btn-outline-secondary me-2"
               style="width: 100px; border-radius: 0;">수정</a>

            <form th:action="@{|/posts/${post.postId}/delete|}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-danger me-2"
                        style="width: 100px; border-radius: 0;">삭제
                </button>
            </form>
        </th:block>

        <a th:href="@{/posts}" class="btn btn-custom-unified" style="width: 100px;">목록</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div></body>
</html>
