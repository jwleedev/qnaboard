<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A 게시글 작성 - Q&A 게시판</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="board-container">
        <!-- Title -->
        <h2 class="board-title mb-4">Q&A 글쓰기</h2>

        <form th:action th:object="${post}" method="post" enctype="multipart/form-data">
            <table class="write-table">
                <tbody>
                    <tr>
                        <th>제목</th>
                        <td>
                            <input type="text" th:field="*{title}" class="form-control" placeholder="제목을 입력하세요." required>
                        </td>
                    </tr>
                    <tr>
                        <th>작성자</th>
                        <td>
                            <input type="text" th:value="${session.loginMember.name}" class="form-control-plaintext ps-2" readonly>
                        </td>
                    </tr>
                    <tr>
                        <th style="vertical-align: top; padding-top: 1.5rem;">내용</th>
                        <td>
                            <textarea th:field="*{content}" class="form-control" rows="15" placeholder="내용을 입력하세요." required></textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>첨부파일 (+)</th>
                        <td>
                            <div class="text-muted mb-2" style="font-size: 0.9rem;"></div>
                            <input class="form-control" type="file" id="formFile" name="file" style="border-radius: 0; max-width: 400px;">
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-end mt-4">
                <button type="submit" class="btn btn-custom-unified me-2" style="width: 100px;">저장</button>
                <a th:href="@{/posts}" class="btn btn-custom-unified" style="width: 100px;">취소</a>
            </div>
        </form>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
